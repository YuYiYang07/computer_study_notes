<!-- Video -->
<video src="video.mp4" controls></video>

<!--
    controls: show video controls
    autoplay: autoplay video
    muted: mute video, required for autoplay in most browsers
    loop: loop video
    width: specify video width
-->
<video src="video.mp4" controls autoplay muted loop width="400"></video>

<!-- Video with multiple formats -->
<video controls width="400">
    <source src="video.mp4" type="video/mp4">
    <source src="video.webm" type="video/webm">
    Cannot load video
</video>

<!-- Video with subtitles -->
<video controls width="400">
    <source src="video.mp4" type="video/mp4">
    <track src="subtitles.vtt" kind="subtitles" srclang="en" label="English">
</video>

<!-- Audio -->
<audio src="audio.mp3" controls></audio>

<!-- Audio with multiple formats -->
<audio controls>
    <source src="audio.mp3" type="audio/mpeg">
    <source src="audio.ogg" type="audio/ogg">
    Cannot load audio
</audio>

<!-- Iframe (embed another webpage) -->
<iframe src="https://example.com"></iframe>

<iframe width="100%" height="600" src="file.pdf" title="PDF">Cannot load PDF</iframe>

<iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video"
    allowfullscreen>Cannot load YouTube video</iframe>
